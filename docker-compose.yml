name: ${COMPOSE_PROJECT_NAME:-himascore}

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${COMPOSE_PROJECT_NAME:-himascore}-app:latest
    restart: unless-stopped
    working_dir: /var/www/html
    env_file:
      - .env
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-db_hima}
      DB_USERNAME: ${DB_APP_USER:-hima_app}
      DB_PASSWORD: ${DB_APP_PASSWORD:-hima_app_pass}
      APP_URL: ${APP_URL:-http://localhost:${APP_PORT:-18080}}
    command: ["/var/www/html/docker/start-app.sh"]
    ports:
      - "127.0.0.1:${APP_PORT:-18080}:8000"
    depends_on:
      mysql:
        condition: service_started
    networks:
      - himascore-net

  queue:
    image: ${COMPOSE_PROJECT_NAME:-himascore}-app:latest
    restart: unless-stopped
    working_dir: /var/www/html
    env_file:
      - .env
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-db_hima}
      DB_USERNAME: ${DB_APP_USER:-hima_app}
      DB_PASSWORD: ${DB_APP_PASSWORD:-hima_app_pass}
      QUEUE_CONNECTION: database
    command: ["/var/www/html/docker/start-queue.sh"]
    depends_on:
      mysql:
        condition: service_started
    networks:
      - himascore-net
    profiles:
      - worker

  vite:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /var/www/html
    command: sh -lc "npm install && npm run dev -- --host 0.0.0.0 --port=5173"
    volumes:
      - ./:/var/www/html
    ports:
      - "127.0.0.1:${VITE_PORT:-15173}:5173"
    networks:
      - himascore-net
    profiles:
      - frontend

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    command: ["--datadir=/var/lib/mysql/data"]
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-db_hima}
      MYSQL_USER: ${DB_APP_USER:-hima_app}
      MYSQL_PASSWORD: ${DB_APP_PASSWORD:-hima_app_pass}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-himascore_root}
      MYSQL_ROOT_HOST: "%"
      TZ: ${TZ:-Asia/Jakarta}
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "127.0.0.1:${DB_FORWARD_PORT:-13306}:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 90s
    networks:
      - himascore-net

networks:
  himascore-net:
    name: ${COMPOSE_PROJECT_NAME:-himascore}_net
    driver: bridge

volumes:
  mysql-data:
    name: ${COMPOSE_PROJECT_NAME:-himascore}_mysql_data_v5
