name: ${COMPOSE_PROJECT_NAME:-himascore}

services:
  app:
    image: laravelsail/php82-composer:latest
    restart: unless-stopped
    working_dir: /var/www/html
    env_file:
      - .env
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-db_hima}
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-${MYSQL_ROOT_PASSWORD:-himascore_root}}
      APP_URL: ${APP_URL:-http://localhost:${APP_PORT:-18080}}
    command: sh -lc "php artisan serve --host=0.0.0.0 --port=8000"
    volumes:
      - ./:/var/www/html
      - composer-cache:/tmp/composer-cache
    ports:
      - "127.0.0.1:${APP_PORT:-18080}:8000"
    depends_on:
      mysql:
        condition: service_started
    networks:
      - himascore-net

  queue:
    image: laravelsail/php82-composer:latest
    restart: unless-stopped
    working_dir: /var/www/html
    env_file:
      - .env
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-db_hima}
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-${MYSQL_ROOT_PASSWORD:-himascore_root}}
      QUEUE_CONNECTION: database
    command: sh -lc "php artisan queue:work --tries=1 --sleep=1 --timeout=90"
    volumes:
      - ./:/var/www/html
      - composer-cache:/tmp/composer-cache
    depends_on:
      mysql:
        condition: service_started
    networks:
      - himascore-net
    profiles:
      - worker

  vite:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /var/www/html
    command: sh -lc "npm install && npm run dev -- --host 0.0.0.0 --port=5173"
    volumes:
      - ./:/var/www/html
    ports:
      - "127.0.0.1:${VITE_PORT:-15173}:5173"
    networks:
      - himascore-net
    profiles:
      - frontend

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-db_hima}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-${DB_PASSWORD:-himascore_root}}
      TZ: ${TZ:-Asia/Jakarta}
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "127.0.0.1:${DB_FORWARD_PORT:-13306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 90s
    networks:
      - himascore-net

networks:
  himascore-net:
    name: ${COMPOSE_PROJECT_NAME:-himascore}_net
    driver: bridge

volumes:
  mysql-data:
    name: ${COMPOSE_PROJECT_NAME:-himascore}_mysql_data_v2
  composer-cache:
    name: ${COMPOSE_PROJECT_NAME:-himascore}_composer_cache
